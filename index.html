<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Digital Clock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #f8fafc;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            text-align: center;
        }

        .time-display {
            /* Using vw units to ensure it scales with screen width */
            font-size: 35vw; 
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .date-display {
            font-size: 2.5vw;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 2rem;
        }

        @media (orientation: portrait) {
            .time-display {
                font-size: 45vw;
                flex-direction: column;
            }
            .date-display {
                font-size: 5vw;
            }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="clock" class="time-display">
            <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span>
        </div>
        <div id="date" class="date-display">
            Loading...
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const hoursStr = String(hours).padStart(2, '0');

            document.getElementById('hours').textContent = hoursStr;
            document.getElementById('minutes').textContent = minutes;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
