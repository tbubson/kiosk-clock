<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Digital Clock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
            padding: 3rem;
            border-radius: 2rem;
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .time-display {
            font-size: 8rem;
            font-weight: 700;
            color: #f8fafc;
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .date-display {
            margin-top: 1rem;
            font-size: 1.25rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Removed the blink animation from here */
        .colon {
            opacity: 1;
        }

        @media (max-width: 640px) {
            .time-display {
                font-size: 5rem;
            }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="clock" class="time-display">
            <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span>
        </div>
        <div id="date" class="date-display">
            Loading...
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Format hours and minutes
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            // Optional: Convert to 12-hour format if desired
            // hours = hours % 12 || 12; 
            const hoursStr = String(hours).padStart(2, '0');

            // Update DOM
            document.getElementById('hours').textContent = hoursStr;
            document.getElementById('minutes').textContent = minutes;

            // Format Date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
        }

        // Run immediately
        updateClock();
        
        // Update every second to ensure the time is accurate as soon as the minute changes
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
